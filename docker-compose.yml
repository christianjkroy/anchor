version: '3.9'
services:
  postgres:
    image: ankane/pgvector:latest
    container_name: anchor-postgres
    environment:
      POSTGRES_DB: anchor
      POSTGRES_USER: anchor
      POSTGRES_PASSWORD: anchor
    ports:
      - '5432:5432'
    volumes:
      - anchor_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U anchor -d anchor']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  anchor_pg_data:
